<!DOCTYPE html>
<html>
<head>
    <title>register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div class="container mt-5">

        <h2>Register</h2>

        <input type="text" id="name" class="form-control mb-3" placeholder="enter name">

        <input type="email" id="email" class="form-control mb-3" placeholder="enter email">

        <input type="password" id="pswd" class="form-control mb-3" placeholder="enter password">

        <button id="register" class="btn btn-primary">
            register
        </button>

        <p id="result" class="mt-3"></p>

        <p>already have an account?</p>

        <a href="login.html">
            login
        </a>

    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="../js/register.js?v=3"></script>

</body>
</html>
