<!DOCTYPE html>
<html>

<head>

    <title>profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../css/style.css">

</head>

<body>

    <div class="container mt-5">

        <h3 id="welcomeName"></h3>

        <input type="number" id="age" class="form-control mb-3" placeholder="enter age">

        <input type="date" id="dob" class="form-control mb-3">

        <input type="text" id="contact" class="form-control mb-3" placeholder="enter contact">

        <button id="saveProfile" class="btn btn-primary">save profile</button>

        <button id="updateProfile" class="btn btn-warning">update</button>

        <p id="result" class="mt-3"></p>

        <div id="profileData"></div>

        <button id="logout" class="btn btn-danger mt-3">logout</button>

    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="../js/profile.js?v=6"></script>

    <script src="../js/logout.js?v=1"></script>

</body>

</html>
